      perception:
        sensors: [USB摄像头, 总线舵机编码器(6个), 力传感器DYW1(可选)]
        algorithms: [ArUco标记检测, 手眼标定, 力控(可选)]
        data_flow: "摄像头→ArUco检测→目标位姿→MoveIt2规划→6路舵机控制 | 编码器→位置反馈"
      control:
        method: 总线舵机位置控制
        algorithm: MoveIt2运动规划 + IK求解 + ArUco视觉伺服
        frequency: 50Hz
      communication:
        protocol: UART总线(舵机) + USB(相机) + I2C(力传感器) + DDS(ROS2)
        framework: ROS2 Humble + MoveIt2 + OpenCV
