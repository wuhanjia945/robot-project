robots:
  - name: 扫地机器人
    category: 家用服务
    icon: vacuum
    description: 自动清扫地面的家用机器人，是消费级机器人中出货量最大的品类
    market_size: 年出货量超1500万台，中国市场占比超40%
    price_range: 500-6000元
    key_brands: [石头科技, 科沃斯, 追觅, iRobot, 云鲸]
    tech_stack:
      navigation: [SLAM, LDS激光雷达, vSLAM视觉导航, DTOF]
      perception: [3D ToF避障, 结构光, 双目视觉, 超声波]
      control: [路径规划算法, 覆盖算法, 弓字形/沿边清扫策略]
      compute: [ARM Cortex-A系列, RK3308, 全志R系列]
      software: [ROS/自研中间件, 手机APP, 语音交互]
    core_algorithms:
      - name: SLAM建图
        description: 激光/视觉SLAM构建家庭地图，定位精度cm级
        difficulty: 4
      - name: 覆盖路径规划
        description: 弓字形/沿边清扫策略，确保全覆盖不遗漏
        difficulty: 3
      - name: 动态避障
        description: 3D ToF/结构光识别拖鞋/电线/宠物粪便等障碍物
        difficulty: 3
    diy_feasibility:
      level: 中等
      min_budget: 500
      difficulty_reason: SLAM算法成熟开源方案多，但传感器融合和调参需要经验
    recommended_stack:
      controller: 树莓派5 + STM32
      sensors: [RPLIDAR A1, MPU6050, 超声波x4]
      motors: [TT马达x2, 吸尘电机]
      framework: ROS2 + Nav2 + Cartographer
    learning_path:
      - step: 1
        title: 搭建差速底盘
        description: 用Arduino/STM32驱动两个TT马达，实现前进后退转弯
      - step: 2
        title: 加入激光雷达
        description: 接入RPLIDAR，用ROS2发布LaserScan话题
      - step: 3
        title: SLAM建图
        description: 用Cartographer/SLAM Toolbox构建房间地图
      - step: 4
        title: 自主导航
        description: 用Nav2实现点对点导航和避障
      - step: 5
        title: 覆盖清扫
        description: 实现弓字形路径规划，确保全覆盖
    detailed_bom:
      - item: Arduino UNO R3
        quantity: 1
        price: 25
        specs: ATmega328P, 5V, 14数字IO
        source: 淘宝/立创
      - item: L298N电机驱动模块
        quantity: 1
        price: 10
        specs: 双H桥, 2A/通道
        source: 淘宝
      - item: TT马达+轮子套装
        quantity: 2
        price: 12
        specs: 1:48减速比, 3-6V, 200RPM
        source: 淘宝
      - item: 亚克力2层底盘套件
        quantity: 1
        price: 20
        specs: 170x130mm, 含铜柱螺丝
        source: 淘宝
      - item: HC-SR04超声波模块
        quantity: 1
        price: 3
        specs: 2-400cm, 精度3mm
        source: 淘宝
      - item: 18650电池+电池盒
        quantity: 1
        price: 15
        specs: 3.7V 2600mAh x2, 含开关
        source: 淘宝
      - item: 杜邦线+螺丝包
        quantity: 1
        price: 8
        specs: 公对母20根+M3螺丝包
        source: 淘宝
    implementation_path:
      - phase: 硬件组装
        steps:
          - action: 组装差速底盘
            detail: 将2个TT马达用M2螺丝固定在亚克力底层，安装万向轮，上层放Arduino和电池
            time: 1小时
          - action: 接线
            detail: L298N的IN1-IN4接Arduino D5-D8，ENA/ENB接D9/D10(PWM)，马达接OUT1-OUT4，超声波Trig接D2/Echo接D3
            time: 30分钟
      - phase: 软件开发
        steps:
          - action: 安装Arduino IDE
            detail: 下载arduino-ide 2.x，安装CH340驱动，选择板卡Arduino UNO
            time: 20分钟
          - action: 烧录电机驱动代码
            detail: 使用analogWrite()控制PWM调速，digitalWrite()控制方向
            code: "void moveForward() { analogWrite(ENA,200); analogWrite(ENB,200); digitalWrite(IN1,HIGH); digitalWrite(IN2,LOW); digitalWrite(IN3,HIGH); digitalWrite(IN4,LOW); }"
            time: 1小时
          - action: 超声波避障
            detail: pulseIn()测距，距离<20cm时后退+转弯
            code: "long dist = pulseIn(ECHO,HIGH)*0.034/2; if(dist<20) { moveBack(); delay(500); turnRight(); delay(300); } else { moveForward(); }"
            time: 2小时
      - phase: 进阶升级
        steps:
          - action: 换用树莓派+ROS2
            detail: 安装ROS2 Humble，配置差速驱动节点，发布cmd_vel话题
            time: 4小时
          - action: 加入激光雷达SLAM
            detail: 接入RPLIDAR A1，运行Cartographer建图
            time: 3小时
          - action: Nav2自主导航
            detail: 配置Nav2，实现点对点导航和弓字形覆盖
            time: 4小时
    tech_framework:
      perception:
        sensors: [HC-SR04超声波, 红外避障模块(可选)]
        algorithms: [距离测量, 简单避障逻辑]
        data_flow: "超声波测距 → Arduino处理 → 电机控制"
      control:
        method: PWM直流调速
        algorithm: 简单if-else避障 → ROS2 Nav2导航(进阶)
        frequency: 10Hz(Arduino) / 20Hz(ROS2)
      communication:
        protocol: 串口UART(Arduino) / DDS(ROS2)
        framework: Arduino原生 → ROS2 Humble
    attachments:
      tutorial:
        title: "Arduino智能小车教程"
        description: "Arduino差速底盘+超声波避障+蓝牙遥控的完整教程，含接线图和代码"
        format: "在线教程"
        status: "可用"
        url: "https://www.hackster.io/amal-shaji/differential-drive-robot-using-ros2-and-esp32-aae289"
      source_code:
        title: "差速驱动机器人源代码"
        description: "ESP32+micro-ROS差速驱动代码，含PID速度控制和里程计"
        url: "https://github.com/amalshaji4540/diffdrive_ws"
        language: "Arduino C++ / Python"
        framework: "micro-ROS / ROS2 Humble"

  - name: 割草机器人
    category: 户外服务
    icon: mower
    description: 自动修剪草坪的户外机器人，欧美市场成熟，国内快速增长
    market_size: 全球年出货量超300万台，欧洲市场占比最大
    price_range: 2000-30000元
    key_brands: [Husqvarna, Worx, 宝时得, 松灵机器人, 追觅]
    tech_stack:
      navigation: [RTK-GNSS定位, 视觉SLAM, 边界线感应]
      perception: [超声波避障, 摄像头, 雨量传感器, 倾斜传感器]
      control: [区域覆盖算法, 充电桩回归, 坡度适应]
      compute: [ARM Cortex-A系列, ESP32]
      software: [ROS2, 手机APP, GPS地图规划]
    core_algorithms:
      - name: RTK-GNSS定位
        description: 厘米级GPS定位，实现无边界线草坪规划
        difficulty: 4
      - name: 区域覆盖算法
        description: 高效覆盖整块草坪，避免重复和遗漏
        difficulty: 3
      - name: 充电桩回归
        description: 低电量自动返回充电桩，充电后继续未完成区域
        difficulty: 2
    diy_feasibility:
      level: 中高
      min_budget: 1500
      difficulty_reason: 户外环境复杂，需要防水防尘设计，RTK定位成本较高
    recommended_stack:
      controller: 树莓派5 + STM32
      sensors: [RTK-GNSS模块, 超声波x4, 倾斜传感器, 雨量传感器]
      motors: [无刷电机x2驱动轮, 草坪切割电机]
      framework: ROS2 + Nav2 + 自研覆盖算法
    learning_path:
      - step: 1
        title: 搭建户外底盘
        description: 防水设计，无刷电机驱动，差速转向
      - step: 2
        title: 加入RTK定位
        description: 接入RTK-GNSS模块，获取厘米级定位
      - step: 3
        title: 地图规划
        description: 在APP上划定草坪边界和工作区域
      - step: 4
        title: 覆盖算法
        description: 实现高效草坪覆盖路径
      - step: 5
        title: 自动充电
        description: 实现低电量自动回充和断点续割
    detailed_bom:
      - item: 树莓派5 8GB
        quantity: 1
        price: 650
        specs: BCM2712四核, 8GB LPDDR4X
        source: 树莓派官方/淘宝
      - item: STM32F407开发板
        quantity: 1
        price: 80
        specs: 168MHz, 192KB RAM, 丰富IO
        source: 淘宝/立创
      - item: RTK-GNSS定位模块
        quantity: 1
        price: 800
        specs: 厘米级定位, GPS+北斗
        source: 淘宝/司南导航
      - item: 无刷电机+驱动
        quantity: 2
        price: 200
        specs: 24V 200W, ESC电调
        source: 淘宝
      - item: 草坪切割电机
        quantity: 1
        price: 150
        specs: 24V 500W无刷, 含刀片
        source: 淘宝
      - item: 超声波模块HC-SR04
        quantity: 4
        price: 12
        specs: 2-400cm测距
        source: 淘宝
      - item: 倾斜传感器MPU6050
        quantity: 1
        price: 8
        specs: 6轴IMU
        source: 淘宝
      - item: 防水外壳+底盘
        quantity: 1
        price: 500
        specs: IP65, 铝合金+ABS
        source: 定制/淘宝
      - item: 24V锂电池组
        quantity: 1
        price: 300
        specs: 24V 10Ah, 含BMS
        source: 淘宝
    implementation_path:
      - phase: 硬件组装
        steps:
          - action: 组装防水底盘
            detail: 铝合金底盘+防水外壳，安装驱动轮和切割电机，确保IP65防水
            time: 3小时
          - action: 接线
            detail: STM32驱动无刷电机(ESC信号线接PWM口)，RTK模块接树莓派USB，IMU接I2C
            time: 1小时
      - phase: 软件开发
        steps:
          - action: 树莓派+ROS2环境
            detail: 安装ROS2 Humble，配置RTK-GNSS驱动，发布gps_fix话题
            time: 2小时
          - action: 覆盖路径规划
            detail: 在APP上划定草坪边界，生成弓字形覆盖路径
            time: 4小时
          - action: 自动充电
            detail: 低电量时导航回充电桩，对接充电触点
            time: 3小时
      - phase: 算法部署
        steps:
          - action: RTK定位校准
            detail: 配置RTK基站或NTRIP服务，确保厘米级定位
            time: 2小时
          - action: 避障+坡度检测
            detail: 超声波检测障碍物停止，IMU检测倾斜>30°停止
            time: 2小时
    tech_framework:
      perception:
        sensors: [RTK-GNSS, 超声波x4, MPU6050 IMU, 雨量传感器(可选)]
        algorithms: [RTK定位, 超声波避障, 倾斜检测]
        data_flow: "RTK定位 → 路径规划 → STM32电机控制 → 超声波避障中断"
      control:
        method: ESC无刷调速 + 切割电机开关
        algorithm: 覆盖路径规划 + 充电桩回归
        frequency: 10Hz
      communication:
        protocol: UART(STM32↔树莓派) + USB(RTK)
        framework: ROS2 Humble
    attachments:
      tutorial:
        title: "Open Mower 割草机器人教程"
        description: "开源智能割草机器人完整教程，从硬件组装到ROS导航"
        format: "在线教程(GitHub Wiki)"
        status: "可用"
        url: "https://github.com/ClemensElflein/OpenMower"
      source_code:
        title: "Open Mower ROS 开源割草机器人"
        description: "基于ROS的智能割草机器人，含覆盖路径规划+RTK定位+自动回充"
        url: "https://github.com/ClemensElflein/open_mower_ros"
        language: "C++ / Python"
        framework: "ROS Noetic"

  - name: 送餐机器人
