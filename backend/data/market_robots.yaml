        steps:
          - action: URDF建模
            detail: 测量臂段长度，创建URDF模型，配置关节限位和DH参数
            time: 3小时
          - action: MoveIt2配置
            detail: 使用MoveIt Setup Assistant配置运动规划组、OMPL规划器
            time: 3小时
          - action: 正逆运动学
            detail: 验证MoveIt2的IK求解，测试关节空间和笛卡尔空间运动
