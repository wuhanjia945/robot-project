            time: 6小时(打印)
          - action: 组装6DOF臂
            detail: 底座→肩1→肩2→肘→腕1→腕2→夹爪，6个总线舵机串联
            time: 2小时
          - action: 接线
            detail: 总线舵机串联接USB转换器→树莓派，摄像头接USB，电源12V
